
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; }
textarea {
  width: 100%;
  min-height: 80px;
  padding: 12px 14px;
  font-size: 16px;
  font-family: var(--font-sans);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  resize: none;
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  line-height: 1.6;
  outline: none;
  transition: border-color 0.15s;
  appearance: none;
}
textarea:focus { border-color: var(--color-border-primary); }
.remove-btn {
  position: absolute;
  top: 8px; right: 8px;
  width: 26px; height: 26px;
  border: none;
  background: var(--color-background-tertiary);
  border-radius: 50%;
  color: var(--color-text-secondary);
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#add-btn {
  width: 100%;
  padding: 14px;
  font-size: 15px;
  cursor: pointer;
  background: var(--color-background-secondary);
  border: 0.5px dashed var(--color-border-secondary);
  border-radius: var(--border-radius-lg);
  color: var(--color-text-secondary);
  margin-top: 4px;
}
#save-btn {
  width: 100%;
  padding: 16px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  background: var(--color-text-primary);
  color: var(--color-background-primary);
  border: none;
  border-radius: var(--border-radius-lg);
  margin-top: 10px;
  transition: opacity 0.15s;
  letter-spacing: 0.1px;
}
#save-btn:active { opacity: 0.75; }
#banner {
  display: none;
  margin-top: 14px;
  padding: 16px;
  border-radius: var(--border-radius-lg);
  text-align: center;
  font-size: 15px;
  font-weight: 500;
  line-height: 1.4;
}
</style>

<div style="padding: 1.5rem 1rem 2.5rem;">
  <h1 style="font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 1.5rem; text-align: center; line-height: 1.3;">Cose da far fare<br>a Lorenzo</h1>

  <div id="tasks-container" style="display: flex; flex-direction: column; gap: 10px;"></div>

  <button id="add-btn" onclick="addTask()">+ Aggiungi un'altra cosa</button>
  <button id="save-btn" onclick="salva()">Salva</button>
  <div id="banner"></div>
</div>

<script>
function addTask() {
  const container = document.getElementById('tasks-container');
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position: relative;';

  const ta = document.createElement('textarea');
  ta.placeholder = 'Scrivi cosa deve fare Lorenzo...';
  ta.style.paddingRight = '40px';
  ta.onfocus = () => ta.style.borderColor = 'var(--color-border-primary)';
  ta.onblur = () => ta.style.borderColor = 'var(--color-border-tertiary)';
  ta.oninput = () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; };

  const btn = document.createElement('button');
  btn.className = 'remove-btn';
  btn.textContent = '×';
  btn.onclick = () => {
    if (document.querySelectorAll('#tasks-container > div').length > 1) wrapper.remove();
  };

  wrapper.appendChild(ta);
  wrapper.appendChild(btn);
  container.appendChild(wrapper);
  setTimeout(() => ta.focus(), 50);
}

function salva() {
  const banner = document.getElementById('banner');
  const btn = document.getElementById('save-btn');

  banner.style.display = 'block';
  banner.style.cssText = 'display:block; margin-top:14px; padding:16px; border-radius:var(--border-radius-lg); text-align:center; font-size:15px; font-weight:500; line-height:1.4; background:var(--color-background-info); color:var(--color-text-info); border:0.5px solid var(--color-border-info);';
  banner.textContent = '⏳ Ordine in elaborazione...';
  btn.disabled = true;
  btn.style.opacity = '0.45';

  setTimeout(() => {
    banner.style.background = 'var(--color-background-warning)';
    banner.style.color = 'var(--color-text-warning)';
    banner.style.border = '0.5px solid var(--color-border-warning)';
    banner.textContent = '😅 Al momento Lorenzo è occupato';
    btn.disabled = false;
    btn.style.opacity = '1';
  }, 5000);
}

addTask();
</script>
